name: inventory_controller_pro

description: >
  A professional offline-first inventory management application
  for small businesses with multi-brand support, Excel import/export,
  PNG report generation, low-stock notifications, analytics,
  and enterprise-grade architecture.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Database
  sqflite: ^2.4.1
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.1
  path_provider: ^2.1.5

  # Excel / CSV
  excel: ^4.0.6
  csv: ^6.0.0

  # File Management
  file_picker: ^10.2.0
  permission_handler: ^12.0.1

  # Share
  share_plus: ^11.0.0

  # Notifications
  flutter_local_notifications: ^19.3.0

  # Date & Time
  intl: ^0.20.2

  # UUID Generator
  uuid: ^4.5.1

  # Image Picker
  image_picker: ^1.2.0

  # Screenshot Generator
  screenshot: ^3.0.0

  # PDF Support
  pdf: ^3.11.3
  printing: ^5.14.2

  # QR Code
  qr_flutter: ^4.1.0

  # Barcode
  barcode_widget: ^2.0.4

  # Charts
  fl_chart: ^1.0.0

  # Animations
  lottie: ^3.3.1

  # Icons
  flutter_svg: ^2.2.0

  # Local Storage
  shared_preferences: ^2.5.3

  # Collection Utilities
  collection: ^1.19.1

dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.14.4

  flutter_native_splash: ^2.4.6

flutter:

  uses-material-design: true

  assets:

    - assets/icons/
    - assets/images/
    - assets/logos/
    - assets/templates/
    - assets/animations/
    - assets/illustrations/
    - assets/placeholders/
    - assets/sounds/
    
  fonts:

    - family: Poppins

      fonts:

        - asset: assets/fonts/Poppins-Regular.ttf

        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500

        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_launcher_icons:

  android: true

  ios: true

  remove_alpha_ios: true

  image_path: assets/icons/app_icon.png

  adaptive_icon_foreground: assets/icons/launcher_foreground.png

  adaptive_icon_background: "#1565C0"

flutter_native_splash:

  color: "#0D47A1"

  image: assets/icons/app_icon.png

  android: true

  ios: true

  web: false

  fullscreen: true